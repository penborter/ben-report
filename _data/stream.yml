- date: "2025-12-31T12:00:00+10:00"
  type: "post"
  ref: "_posts/2025-12-31-Reading-2025.md"
  title: "Reading in 2025 - a review"
  content: "Every year I aim to read about a book a week—normally (almost every year) I fall short, but the goal helps me keep to keep picking up books when I get into a lull without being too dogmatic about it. In 2025 I read 38 books. The full list of that year's books (and all years' books, too) is available at the [Books](/books) link at the top of the sidebar. This post is just a summary of the books, themes, patterns, key quotes, etc., from the past year only and some guiding notes for next year."
