- date: "2025-02-22T12:00:00+10:00"
  type: "post"
  ref: "_posts/2025-02-22-Distance-and-playing-time.md"
  title: "Distance and playing time [NBA]"
  content: "In general, players that play less run more in the time they do have on the court. Which makes sense: they’re fresher, they’ve got more to prove, and they’re often role players who are running hard in the 10-20 minutes they get each night."
- date: "2025-04-13T12:00:00+10:00"
  type: "review"
  ref: "_reviews/The-Intellectual-Life-of-the-British-Working-Classes.md"
  title: "The Intellectual Life of the British Working Classes"
  content: "Really interesting book which does exactly what it says on the cover, highlighting the reading and intellectual history of the British working class from around 1800 through to 1950. Basically an exploration of case studies, memoirs, autobiographies, focusing on what these people read, how, where and with whom they read it, and the ideas they had because of it. "
  quote:
    text: "But in the study of the drama my education has left me little, if at all, in advance of any of my class, because the points which come up for discussion are questions of life and character where their knowledge and experience are as great, and probably greater, than my own. It seems to me that we find in the plays, and particularly in the Shakespeare plays, a basis of common experience and common humanity which destroys any barrier erected by social conventions and differences in educational opportunities."
    author: "Jonathan Rose"
    source: "The Intellectual Life of the British Working Classes"
- date: "2025-04-18T12:00:00+10:00"
  type: "post"
  ref: "_posts/2025-04-18-Circular-Quay-Balmoral.md"
  title: "Walking from Circular Quay to Balmoral"
  content: "One Good Friday we walked from Circular to Balmoral, continuing the Watsons Bay to Circular Quay segment we'd done in August. Originally we'd planned to walk all the way to Manly, but called it early mainly because we didn't pack enough food to keep us entertained. To where we stopped the walk was about 15 km (~9 miles), three hours, mostly flat through the middle with some trekking over headlands at the start."
